{
  // list of files that are part of the verification project 
  "files": [
    "silo-core/contracts/utils/ShareDebtToken.sol",
    "silo-core/contracts/utils/ShareCollateralToken.sol",
    "certora/harness/Silo0.sol",
    "certora/harness/Silo1.sol",
    "certora/harness/ShareCollateral0.sol",
    "certora/harness/ShareCollateral1.sol",
    "certora/harness/ShareProtected0.sol",
    "certora/harness/ShareProtected1.sol",
    "certora/harness/ShareDebt0.sol",
    "certora/harness/ShareDebt1.sol",
    "certora/mocks/Token0.sol",
    "certora/mocks/Token1.sol",
    "silo-core/contracts/SiloConfig.sol"
  ],
  // setting silo field to be the instance of Silo0
  // silo0 config to be SiloConfig instance  
  "link": [
    "ShareCollateralToken:silo=Silo0",
    "Silo0:config=SiloConfig",
    "ShareDebtToken:silo=Silo1",
    "Silo1:config=SiloConfig",
    "SiloConfig:_SILO0=Silo0",
    "SiloConfig:_SILO1=Silo1",
    "SiloConfig:_TOKEN0=Token0",
    "SiloConfig:_TOKEN1=Token1",
    "SiloConfig:_PROTECTED_COLLATERAL_SHARE_TOKEN0=ShareProtected0",
    "SiloConfig:_COLLATERAL_SHARE_TOKEN0=ShareCollateral0",
    "SiloConfig:_DEBT_SHARE_TOKEN0=ShareDebt0",
    "SiloConfig:_PROTECTED_COLLATERAL_SHARE_TOKEN1=ShareProtected1",
    "SiloConfig:_COLLATERAL_SHARE_TOKEN1=ShareCollateral1",
    "SiloConfig:_DEBT_SHARE_TOKEN1=ShareDebt1"
    // this will ignore calling for prices
    // "SiloConfig:_SOLVENCY_ORACLE0=0",
    // "SiloConfig:_MAX_LTV_ORACLE0=0",
    // "SiloConfig:_SOLVENCY_ORACLE1=0",
    // "SiloConfig:_MAX_LTV_ORACLE1=0"
  ],
  // main contract under verification (Silo0) and spec file
  "verify": "Silo0:certora/specs/SiloIsSolvent.spec",
  // loop handling, assume one iteration 
  "optimistic_loop": true,
  // for parametric rules and invariants, take into account only ShareDebtToken functions
  "parametric_contracts": ["Silo0", "Silo1", "ShareDebtToken", "ShareCollateralToken"],
  // for solc 
  "packages":[
          "openzeppelin-contracts-upgradeable/=gitmodules/openzeppelin-contracts-upgradeable/contracts",
          "openzeppelin-contracts-upgradeable@v3.4.2/=gitmodules/openzeppelin-contracts-upgradeable@v3.4.2/contracts",
          "openzeppelin-contracts/=gitmodules/openzeppelin-contracts/contracts",
          "chainlink/=gitmodules/chainlink/contracts/src",
          "chainlink-ccip/=gitmodules/chainlink-ccip/contracts/src",
          "uniswap/=gitmodules/uniswap",
          "@uniswap/v3-core/=gitmodules/uniswap/v3-core"
  ],
  // dispaly message in the prover.certora.com 
  "msg": "Silo.isSolvent",
  "loop_iter": "7"
}
